---
layout: default
title: "学生信息填报"
permalink: /student-form/
---

<style>
.form-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.login-section {
    text-align: center;
    padding: 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    margin-bottom: 24px;
    color: white;
}
.login-section h2 { margin-top: 0; }
.login-section p { opacity: 0.9; }
.github-login-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: #24292e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.github-login-btn:hover {
    background: #1a1e22;
    transform: translateY(-2px);
}
.user-info {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: #e8f5e9;
    border-radius: 8px;
    margin-bottom: 20px;
}
.user-info img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}
.form-section {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid #e9ecef;
}
.form-section h2 {
    color: #2c3e50;
    border-bottom: 2px solid #3498db;
    padding-bottom: 10px;
    margin-top: 0;
}
.form-group {
    margin-bottom: 18px;
}
.form-group label {
    display: block;
    font-weight: 600;
    color: #34495e;
    margin-bottom: 6px;
}
.form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #dce1e6;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
}
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}
.dynamic-list {
    background: #fff;
    border-radius: 8px;
    padding: 12px;
    margin-top: 8px;
}
.dynamic-item {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
}
.dynamic-item input { flex: 1; }
.btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-size: 14px;
}
.btn-primary {
    background: linear-gradient(135deg, #3498db, #2980b9);
    color: white;
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
}
.btn-secondary {
    background: #e9ecef;
    color: #495057;
}
.btn-success {
    background: linear-gradient(135deg, #27ae60, #229954);
    color: white;
}
.btn-danger {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
}
.btn-small { padding: 6px 12px; font-size: 12px; }
.hidden { display: none !important; }
.hint { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
.output-section {
    background: #1e272e;
    border-radius: 12px;
    padding: 24px;
    margin-top: 24px;
}
.output-section h2 { color: #f8f9fa; border-bottom-color: #27ae60; }
#output {
    background: #2d3436;
    color: #55efc4;
    padding: 16px;
    border-radius: 8px;
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    overflow-x: auto;
    max-height: 400px;
    overflow-y: auto;
}
.admin-panel {
    background: #fff3e0;
    border: 1px solid #ffb74d;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
}
.admin-panel h3 { margin: 0 0 10px 0; color: #e65100; }
</style>

<div class="form-container">
    <h1 style="text-align: center; color: #2c3e50; margin-bottom: 8px;">🎓 学生信息填报系统</h1>
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 32px;">需要 GitHub 登录后才能提交信息</p>

    <!-- 登录区域 -->
    <div id="loginSection" class="login-section">
        <h2>🔐 请先登录</h2>
        <p>使用 GitHub 账号登录后才能提交信息</p>
        <button class="github-login-btn" onclick="loginWithGitHub()">
            <svg height="24" viewBox="0 0 16 16" width="24" fill="white">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            使用 GitHub 登录
        </button>
    </div>

    <!-- 已登录区域 -->
    <div id="loggedInSection" class="hidden">
        <div class="user-info">
            <img id="userAvatar" src="" alt="Avatar">
            <div>
                <strong id="userName"></strong>
                <span id="isAdmin" class="hidden" style="background: #e74c3c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 8px;">管理员</span>
                <br><small id="userLogin" style="color: #666;"></small>
            </div>
            <button class="btn btn-secondary btn-small" style="margin-left: auto;" onclick="logout()">退出登录</button>
        </div>

        <!-- 管理员面板 -->
        <div id="adminPanel" class="admin-panel hidden">
            <h3>⚙️ 管理员面板</h3>
            <p>管理员可以直接编辑所有成员信息。</p>
            <a href="https://github.com/sanbai123/JixinZhang_Lab.github.io/edit/main/_data/members.yml" target="_blank" class="btn btn-primary btn-small">直接编辑 members.yml</a>
        </div>

        <form id="studentForm">
            <!-- 基本信息 -->
            <div class="form-section">
                <h2>📋 基本信息</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>中文姓名 *</label>
                        <input type="text" id="name" placeholder="例：张三" required>
                    </div>
                    <div class="form-group">
                        <label>英文姓名</label>
                        <input type="text" id="name_en" placeholder="例：San Zhang">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>身份 *</label>
                        <select id="role">
                            <option value="PhD Student">博士生</option>
                            <option value="Master Student">硕士生</option>
                            <option value="Undergraduate">本科生</option>
                            <option value="Postdoc">博士后</option>
                            <option value="Research Assistant">研究助理</option>
                            <option value="Visiting Scholar">访问学者</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>状态 *</label>
                        <select id="status">
                            <option value="current">在读</option>
                            <option value="alumni">已毕业</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>邮箱 *</label>
                    <input type="email" id="email" placeholder="your-email@example.com" required>
                </div>
                <div class="form-group">
                    <label>入学时间</label>
                    <input type="month" id="join_date">
                </div>
            </div>

            <!-- 个人简介 -->
            <div class="form-section">
                <h2>👤 个人简介</h2>
                <div class="form-group">
                    <label>头像照片</label>
                    <input type="file" id="photo" accept="image/*">
                    <p class="hint">建议上传 1:1.25 比例的照片，文件名使用姓名拼音</p>
                </div>
                <div class="form-group">
                    <label>个人简介</label>
                    <textarea id="bio" rows="3" placeholder="研究方向、兴趣等简介..."></textarea>
                </div>
                <div class="form-group">
                    <label>研究方向</label>
                    <div id="research_interests" class="dynamic-list">
                        <div class="dynamic-item">
                            <input type="text" placeholder="例：计算机视觉">
                            <button type="button" class="btn btn-secondary btn-small" onclick="removeItem(this)">删除</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary btn-small" style="margin-top: 8px;" onclick="addItem('research_interests')">+ 添加研究方向</button>
                </div>
            </div>

            <!-- 教育背景 -->
            <div class="form-section">
                <h2>🎓 教育背景</h2>
                <div class="form-group">
                    <div id="education" class="dynamic-list">
                        <div class="dynamic-item">
                            <input type="text" placeholder="例：2020-至今, XX大学, 博士在读">
                            <button type="button" class="btn btn-secondary btn-small" onclick="removeItem(this)">删除</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary btn-small" style="margin-top: 8px;" onclick="addItem('education')">+ 添加教育经历</button>
                </div>
            </div>

            <!-- 发表论文 -->
            <div class="form-section">
                <h2>📝 发表论文</h2>
                <div id="publications">
                    <div class="publication-item" style="background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 12px;">
                        <div class="form-row">
                            <div class="form-group">
                                <label>论文标题</label>
                                <input type="text" class="pub-title" placeholder="论文标题">
                            </div>
                            <div class="form-group">
                                <label>会议/期刊</label>
                                <input type="text" class="pub-venue" placeholder="例：CVPR 2023">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>作者</label>
                                <input type="text" class="pub-authors" placeholder="作者列表">
                            </div>
                            <div class="form-group">
                                <label>论文链接</label>
                                <input type="url" class="pub-link" placeholder="https://...">
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary btn-small" onclick="addPublication()">+ 添加论文</button>
            </div>

            <!-- 奖项荣誉 -->
            <div class="form-section">
                <h2>🏆 奖项荣誉</h2>
                <div class="form-group">
                    <div id="awards" class="dynamic-list">
                        <div class="dynamic-item">
                            <input type="text" placeholder="例：2023年 国家奖学金">
                            <button type="button" class="btn btn-secondary btn-small" onclick="removeItem(this)">删除</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary btn-small" style="margin-top: 8px;" onclick="addItem('awards')">+ 添加奖项</button>
                </div>
            </div>

            <!-- 社交链接 -->
            <div class="form-section">
                <h2>🔗 社交链接</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>个人主页</label>
                        <input type="url" id="link_homepage" placeholder="https://your-homepage.com">
                    </div>
                    <div class="form-group">
                        <label>GitHub</label>
                        <input type="text" id="link_github" placeholder="GitHub 用户名">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Google Scholar</label>
                        <input type="url" id="link_scholar" placeholder="https://scholar.google.com/citations?user=xxx">
                    </div>
                    <div class="form-group">
                        <label>LinkedIn</label>
                        <input type="text" id="link_linkedin" placeholder="LinkedIn 用户名">
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin: 32px 0;">
                <button type="button" class="btn btn-primary" style="padding: 14px 40px; font-size: 16px; margin-right: 10px;" onclick="generateYAML()">生成 YAML</button>
                <button type="button" class="btn btn-success" style="padding: 14px 40px; font-size: 16px;" onclick="submitToGitHub()">提交到 GitHub</button>
            </div>
        </form>

        <!-- 输出区域 -->
        <div class="output-section">
            <h2>📄 生成结果</h2>
            <div id="output">填写表单后点击"生成 YAML"按钮...</div>
            <div style="text-align: center; margin-top: 16px;">
                <button type="button" class="btn btn-secondary" onclick="copyToClipboard()">📋 复制到剪贴板</button>
            </div>
        </div>
    </div>
</div>

<script>
// 配置 - 需要在 GitHub 创建 OAuth App 后填入
const CONFIG = {
    // GitHub OAuth App 配置
    // 请在 https://github.com/settings/developers 创建 OAuth App
    // Authorization callback URL: https://sanbai123.github.io/JixinZhang_Lab.github.io/student-form/
    clientId: '', // 填入你的 OAuth App Client ID
    redirectUri: window.location.href.split('?')[0],
    // 管理员 GitHub 用户名列表
    admins: ['sanbai123'],
    // 仓库信息
    repo: 'sanbai123/JixinZhang_Lab.github.io'
};

let currentUser = null;
let accessToken = null;

// 检查 URL 中的 access_token (从 OAuth 回调)
function checkAuth() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    
    if (params.has('access_token')) {
        accessToken = params.get('access_token');
        window.location.hash = '';
        localStorage.setItem('github_token', accessToken);
        fetchUserInfo();
    } else if (localStorage.getItem('github_token')) {
        accessToken = localStorage.getItem('github_token');
        fetchUserInfo();
    }
}

// 登录
function loginWithGitHub() {
    if (!CONFIG.clientId) {
        alert('请先配置 GitHub OAuth App Client ID！\n\n管理员请在 GitHub 创建 OAuth App 后，更新配置。');
        return;
    }
    
    const authUrl = `https://github.com/login/oauth/authorize?client_id=${CONFIG.clientId}&redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}&scope=public_repo`;
    window.location.href = authUrl;
}

// 获取用户信息
async function fetchUserInfo() {
    try {
        const response = await fetch('https://api.github.com/user', {
            headers: { 'Authorization': `token ${accessToken}` }
        });
        
        if (response.ok) {
            currentUser = await response.json();
            showLoggedInUI();
        } else {
            localStorage.removeItem('github_token');
            accessToken = null;
        }
    } catch (error) {
        console.error('获取用户信息失败:', error);
    }
}

// 显示已登录 UI
function showLoggedInUI() {
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('loggedInSection').classList.remove('hidden');
    document.getElementById('userAvatar').src = currentUser.avatar_url;
    document.getElementById('userName').textContent = currentUser.name || currentUser.login;
    document.getElementById('userLogin').textContent = '@' + currentUser.login;
    
    // 检查是否为管理员
    const isAdmin = CONFIG.admins.includes(currentUser.login);
    if (isAdmin) {
        document.getElementById('isAdmin').classList.remove('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
    }
    
    // 预填 GitHub 用户名
    document.getElementById('link_github').value = currentUser.login;
}

// 退出登录
function logout() {
    localStorage.removeItem('github_token');
    accessToken = null;
    currentUser = null;
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('loggedInSection').classList.add('hidden');
}

// 添加/删除列表项
function addItem(containerId) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'dynamic-item';
    div.innerHTML = `<input type="text" placeholder="请输入内容"><button type="button" class="btn btn-secondary btn-small" onclick="removeItem(this)">删除</button>`;
    container.appendChild(div);
}

function removeItem(btn) {
    if (btn.parentElement.parentElement.children.length > 1) {
        btn.parentElement.remove();
    }
}

function addPublication() {
    const container = document.getElementById('publications');
    const div = document.createElement('div');
    div.className = 'publication-item';
    div.style.cssText = 'background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 12px;';
    div.innerHTML = `
        <div class="form-row">
            <div class="form-group"><label>论文标题</label><input type="text" class="pub-title" placeholder="论文标题"></div>
            <div class="form-group"><label>会议/期刊</label><input type="text" class="pub-venue" placeholder="例：CVPR 2023"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>作者</label><input type="text" class="pub-authors" placeholder="作者列表"></div>
            <div class="form-group"><label>论文链接</label><input type="url" class="pub-link" placeholder="https://..."></div>
        </div>
    `;
    container.appendChild(div);
}

function getListValues(containerId) {
    return Array.from(document.querySelectorAll(`#${containerId} .dynamic-item input`))
        .map(input => input.value.trim()).filter(v => v);
}

function getPublications() {
    return Array.from(document.querySelectorAll('#publications .publication-item'))
        .map(item => ({
            title: item.querySelector('.pub-title').value.trim(),
            authors: item.querySelector('.pub-authors').value.trim(),
            venue: item.querySelector('.pub-venue').value.trim(),
            link: item.querySelector('.pub-link').value.trim()
        })).filter(p => p.title);
}

// 生成 YAML
function generateYAML() {
    const name = document.getElementById('name').value.trim();
    if (!name) { alert('请填写中文姓名！'); return; }

    let yaml = `  - name: "${name}"\n`;
    yaml += `    name_en: "${document.getElementById('name_en').value || ''}"\n`;
    yaml += `    avatar: "images/members/${(document.getElementById('name_en').value || name).toLowerCase().replace(/\s+/g, '_')}.jpg"\n`;
    yaml += `    role: "${document.getElementById('role').value}"\n`;
    yaml += `    status: "${document.getElementById('status').value}"\n`;
    yaml += `    email: "${document.getElementById('email').value}"\n`;
    yaml += `    bio: "${document.getElementById('bio').value || ''}"\n`;
    yaml += `    github_username: "${currentUser ? currentUser.login : ''}"\n`;
    
    const interests = getListValues('research_interests');
    if (interests.length) {
        yaml += `    research_interests:\n${interests.map(i => `      - "${i}"`).join('\n')}\n`;
    }
    
    const education = getListValues('education');
    if (education.length) {
        yaml += `    education:\n${education.map(e => `      - "${e}"`).join('\n')}\n`;
    }
    
    const pubs = getPublications();
    if (pubs.length) {
        yaml += `    publications:\n`;
        pubs.forEach(p => {
            yaml += `      - title: "${p.title}"\n        authors: "${p.authors}"\n        venue: "${p.venue}"\n`;
            if (p.link) yaml += `        link: "${p.link}"\n`;
        });
    }
    
    const awards = getListValues('awards');
    if (awards.length) {
        yaml += `    awards:\n${awards.map(a => `      - "${a}"`).join('\n')}\n`;
    }
    
    yaml += `    links:\n`;
    yaml += `      homepage: "${document.getElementById('link_homepage').value || ''}"\n`;
    yaml += `      github: "${document.getElementById('link_github').value || ''}"\n`;
    yaml += `      google_scholar: "${document.getElementById('link_scholar').value || ''}"\n`;
    yaml += `      linkedin: "${document.getElementById('link_linkedin').value || ''}"\n`;
    yaml += `    join_date: "${document.getElementById('join_date').value || ''}"\n`;

    document.getElementById('output').textContent = yaml;
    return yaml;
}

// 提交到 GitHub (创建 Issue)
async function submitToGitHub() {
    if (!currentUser || !accessToken) {
        alert('请先登录！');
        return;
    }
    
    const yaml = generateYAML();
    const name = document.getElementById('name').value.trim();
    
    const issueBody = `## 操作类型
- [x] 新增成员
- [ ] 更新信息
- [ ] 删除成员

## 基本信息
- **中文姓名**: ${name}
- **英文姓名**: ${document.getElementById('name_en').value}
- **身份**: ${document.getElementById('role').value}
- **状态**: ${document.getElementById('status').value === 'current' ? '在读' : '已毕业'}
- **邮箱**: ${document.getElementById('email').value}
- **入学时间**: ${document.getElementById('join_date').value}

## 个人简介
${document.getElementById('bio').value || '无'}

## 研究方向
${getListValues('research_interests').map(i => `- ${i}`).join('\n') || '无'}

## 教育背景
${getListValues('education').map(e => `- ${e}`).join('\n') || '无'}

## 发表论文
${getPublications().map(p => `- ${p.title} [${p.venue}]`).join('\n') || '无'}

## 奖项荣誉
${getListValues('awards').map(a => `- ${a}`).join('\n') || '无'}

## 社交链接
- **个人主页**: ${document.getElementById('link_homepage').value || '无'}
- **GitHub**: ${document.getElementById('link_github').value || '无'}
- **Google Scholar**: ${document.getElementById('link_scholar').value || '无'}

## YAML 数据
\`\`\`yaml
${yaml}
\`\`\`

---
**提交者**: @${currentUser.login}`;

    try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.repo}/issues`, {
            method: 'POST',
            headers: {
                'Authorization': `token ${accessToken}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: `[成员信息] ${name}`,
                body: issueBody,
                labels: ['member-update', 'pending-review']
            })
        });
        
        if (response.ok) {
            const issue = await response.json();
            alert(`✅ 提交成功！\n\nIssue 已创建：${issue.html_url}\n\n请等待管理员审核。`);
        } else {
            const error = await response.json();
            alert(`提交失败：${error.message}\n\n请确保你有权限访问此仓库。`);
        }
    } catch (error) {
        alert(`提交失败：${error.message}\n\n你可以复制 YAML 内容，手动创建 Issue。`);
    }
}

// 复制到剪贴板
function copyToClipboard() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板！'));
}

// 初始化
checkAuth();
