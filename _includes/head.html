<html lang="{% if page.lang %}{{ page.lang }}{% else %}{{ site.default_lang }}{% endif %}" class="no-js">
<meta charset="utf-8">

{% include seo.html %}

{% if page.lang %}
  <link rel="alternate" hreflang="en" href="{{ page.url | absolute_url }}" />
  <link rel="alternate" hreflang="zh" href="{{ page.url | absolute_url }}?lang=zh" />
  <link rel="alternate" hreflang="x-default" href="{{ page.url | absolute_url }}" />
{% endif %}

<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="assets/css/main.css">

<meta http-equiv="cleartype" content="on">
<head>
  <base target="_blank">
</head>
