<div class="language-switcher-wrapper">
  <div class="language-dropdown">
    <button class="language-toggle" onclick="toggleLanguageDropdown()">
      <i class="fas fa-globe" aria-hidden="true"></i>
      <span class="current-lang-text">EN</span>
      <i class="fas fa-chevron-down lang-arrow" aria-hidden="true"></i>
    </button>
    <div class="language-menu" id="languageMenu">
      <button 
        class="language-option {% if page.lang == 'en' or page.lang == nil %}language-option--active{% endif %}"
        onclick="switchLanguage('en')"
        data-lang="en"
      >
        <span class="lang-flag">🇬🇧</span>
        <span>English</span>
      </button>
      <button 
        class="language-option {% if page.lang == 'zh' %}language-option--active{% endif %}"
        onclick="switchLanguage('zh')"
        data-lang="zh"
      >
        <span class="lang-flag">🇨🇳</span>
        <span>中文</span>
      </button>
    </div>
  </div>
</div>

<script>
// Toggle dropdown menu
function toggleLanguageDropdown() {
  const menu = document.getElementById('languageMenu');
  menu.classList.toggle('language-menu--show');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(event) {
  const wrapper = document.querySelector('.language-switcher-wrapper');
  if (!wrapper.contains(event.target)) {
    const menu = document.getElementById('languageMenu');
    if (menu) {
      menu.classList.remove('language-menu--show');
    }
  }
});

// Language switching functionality
function switchLanguage(lang) {
  // Save preference
  localStorage.setItem('site-language', lang);
  
  // Update URL
  const url = new URL(window.location);
  if (lang === 'en') {
    url.searchParams.delete('lang');
  } else {
    url.searchParams.set('lang', lang);
  }
  window.history.replaceState({}, '', url);
  
  // Reload page to apply language
  window.location.reload();
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  const savedLang = localStorage.getItem('site-language');
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  const currentLang = urlLang || savedLang || 'en';
  
  // Update current language text
  const langTexts = {
    'en': 'EN',
    'zh': 'CN'
  };
  const currentTextEl = document.querySelector('.current-lang-text');
  if (currentTextEl) {
    currentTextEl.textContent = langTexts[currentLang] || 'EN';
  }
});
</script>
